// Fixture: 01_basic
// Exercises: one each of `type`, `function`, `annotation`; trailing `@validate`
// on a type and on a field; leading `@description` on a message.
//
// Expected behavior:
//   - `type Email` lowers to a `FileTypeDecls` entry plus expansion at the
//     `email` field's annotation list.
//   - `function is_email` lowers to a `FileFunctions` entry; the call site
//     inside `@validate` is verified against this declaration.
//   - `annotation tag` lowers to a `FileAnnotationDecls` entry; the `@tag`
//     uses on `email` and `User` lower to carrier entries on FieldOptions
//     and MessageOptions respectively.

syntax = "proto3";

package fixtures.basic;

import "protowire/schema/v1/annotations.proto";

// A user-declared annotation.
annotation tag(name: string);

// A validation function; the body is provided by the engine at runtime.
function is_email(value: string);

// A refinement alias on string.
type Email = string
  @validate(is_email(this), code = "email.invalid")
  @description("an RFC 5321-compliant email address");

@description("a registered user")
@tag(name = "auth")
message User {
  Email email = 1
    @description("primary contact address")
    @tag(name = "pii");
}
