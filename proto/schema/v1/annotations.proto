// Protowire Schema Extensions — canonical annotation library.
//
// IMPORTANT: This file uses v1.2 schema-extension grammar (the `annotation`
// keyword and the `@`-sigil use sites). It REQUIRES a v1.2-compliant parser
// to load. v1.1 (and earlier) ports MUST NOT attempt to compile this file;
// they will fail at the first `annotation` keyword.
//
// Stock `protoc` and any v1.1 protowire port also cannot parse this file.
// The file exists in the repository as the canonical declaration source —
// the source of truth for what `@validate`, `@required`, etc. mean at the
// language level. The descriptor-level lowering targets these annotations
// produce live in the sibling file `descriptor.proto`, which is stock
// proto3 and parseable by any tool.
//
// Per the M0 milestone in docs/RFC-001-issues.md (#004), this file lands
// in the repository for spec-text purposes and becomes loadable once the
// reference `protocompile` parser ships v1.2 grammar support (issue #030).
//
// For the design context, see docs/RFC-001-schema-extensions.md §5.2.

syntax = "proto3";

package protowire.schema.v1;

// validate — attach a validation rule to a type, field, or message.
//
// `rule` is engine-language source (CEL by default; project-configurable).
// `code` is an optional stable identifier used by the i18n catalog and by
// programmatic error consumers.
// `message` is an optional fallback message used when no catalog entry
// matches the code.
//
// When called from a `type` declaration, `this` inside `rule` binds to:
//   - the unwrapped scalar value, for wrapper-based types;
//   - the message instance, for message-based types;
//   - the primitive value, for primitive- and enum-based types.
// When called at a message-level annotation, `this` binds to the message.
annotation validate(
  rule: expression,
  code: string = "",
  message: string = ""
);

// required — declare that a field MUST be present.
//
// Validation runs the field's rules only when it is set; absence with
// @required produces a Violation with code "required" in a layer prior
// to rule evaluation. Null (for wrapper / optional fields) counts as
// present.
//
// Equivalent in effect to the bracket-form `[(pxf.required) = true]`
// retained from protowire v1.0.
annotation required;

// default — substitute `value` when the field is absent.
//
// The default is applied only on absence; null fields are not replaced.
// After substitution, the field's validation rules are evaluated against
// the substituted value. Best practice: the default should itself pass
// the field's validation rules; tooling MAY check this at compile time.
// A rule that fails against the substituted value is reported with
// rule_kind RULE_KIND_DEFAULT — a schema-authoring error, not an
// instance error (RFC-001 §6.4).
//
// Equivalent in effect to the bracket-form `[(pxf.default) = "..."]`
// retained from protowire v1.0.
annotation default(value: any);

// description — human-readable description.
//
// Surfaces in generated documentation (OpenAPI, JSON Schema, IDE hover,
// etc.). Does not influence runtime validation.
annotation description(text: string);

// example — example value.
//
// Surfaces as documentation (e.g., OpenAPI schema example). Tooling MAY
// also run it as an executable test fixture: an example with
// `expect = "pass"` MUST validate; with `expect = "fail"` MUST produce
// a Violation. The `expect` arg is optional; if absent, the example is
// documentation only.
annotation example(value: any);

// error_code — override the stable code emitted on validation failure.
//
// Attaches at the same site as the rule it modifies; the engine emits
// this code instead of the rule's default.
annotation error_code(code: string);

// deprecated — mark a declaration as deprecated.
//
// `reason` is optional; tooling renders it where deprecation notices
// surface (IDE warnings, generated-code comments, doc emit).
annotation deprecated(reason: string = "");

// sensitive — classify a declaration's value as sensitive material
// (credentials, tokens, personal data).
//
// Classification, not protection: wire encoding, storage, programmatic
// access, and validation semantics are unaffected. Surfaces that render
// field values for human or log consumption MUST redact to "[REDACTED]",
// engines MUST withhold offending values from validation reports, and
// doc generators MUST NOT emit values or examples (RFC-001 §6.7).
// Encryption-at-rest and key management remain PXF/chameleon-layer
// concerns; those layers MAY consume this classification to select
// fields. Attaches to fields, type aliases (expands to consuming
// fields), and messages (all fields, transitively through message-typed
// fields).
//
// A classification parameter (e.g. secret vs. PII) is deferred; adding
// optional defaulted parameters to a canonical annotation is additive.
annotation sensitive;

// http — attach HTTP routing metadata to an RPC method.
//
// Used by OpenAPI / Swagger generators to produce REST-bound surface
// descriptions. Pairs naturally with the `google.api.http` option in
// schemas that prefer it; either form is accepted by tooling that
// understands both.
annotation http(method: string, path: string);
