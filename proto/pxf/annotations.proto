syntax = "proto3";

package pxf;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  // Mark a field as required in PXF. Absent fields cause a validation error.
  // A field set to null still counts as present.
  bool required = 50000;

  // Default value applied when a field is absent (not null) in PXF.
  // The value is a PXF literal string, e.g. "42", "true", "\"hello\"".
  string default = 50001;

  // Key field of a keyed repeated field (issue #116). Valid only on
  // repeated message-typed fields; the value names a singular string
  // field of the element message. In PXF text the field may then be
  // written as a block of named blocks — entry name = key value,
  // entry order = list order. pb/SBE wire outputs are unchanged.
  string key = 50002;
}
